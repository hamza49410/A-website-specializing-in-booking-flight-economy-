<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نتائج البحث</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet1.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">✈️ SkyDeal</div>
        <div class="nav-links">
            <a href="/">الرئيسية</a>
        </div>
    </nav>
    <section class="offers">
        <h2>✈️ نتائج البحث: {{ from_city }} → {{ to_city }}</h2>
        <div class="offers-grid">
            <div class="offer-card">
                <div class="badge">-40%</div>
                <div class="route">{{ from_city }} ✈️ {{ to_city }}</div>
                <div class="airline">Qatar Airways</div>
                <div class="prices">
                    <span class="old">800 ريال</span>
                    <span class="new">480 ريال</span>
                </div>
                <div class="expires">⏱ ينتهي خلال: 2 يوم</div>
                <a href="/booking">
                    <button class="btn-book">احجز الآن</button>
                </a>
            </div>
            <div class="offer-card">
                <div class="badge">-35%</div>
                <div class="route">{{ from_city }} ✈️ {{ to_city }}</div>
                <div class="airline">فلاي ناس</div>
                <div class="prices">
                    <span class="old">1200 ريال</span>
                    <span class="new">780 ريال</span>
                </div>
                <div class="expires">⏱ ينتهي خلال: 5 أيام</div>
                <a href="/booking">
                    <button class="btn-book">احجز الآن</button>
                </a>
            </div>
        </div>
    </section>
</body>
</html>tml>
