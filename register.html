<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل حساب</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet1.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">✈️ SkyDeal</div>
    </nav>
    <div class="auth-container">
        <div class="auth-box">
            <h2>إنشاء حساب جديد</h2>
            <form action="/register" method="POST">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" name="name" placeholder="أدخل اسمك" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-search">تسجيل</button>
                <p class="auth-link">عندك حساب؟ <a href="/login">سجل دخول</a></p>
            </form>
        </div>
    </div>
</body>
</html>
